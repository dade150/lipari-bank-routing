<div class="profile-container">
  @if (user) {
    <h2>👤 Il mio profilo</h2>
    <ul>
      <li><strong>Nome:</strong> {{ user.name }}</li>
      <li><strong>ID:</strong> {{ user.id }}</li>
      <li><strong>Ruolo:</strong> {{ user.role }}</li>
    </ul>
  } @else {
    <p>Utente non trovato.</p>
  }
</div>
